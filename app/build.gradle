plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.google.services)
    alias(libs.plugins.firebase.crashlytics)
    alias(libs.plugins.ksp)
    alias(libs.plugins.kotlin.compose)
    alias(libs.plugins.roborazzi)
}

// Signature release : pilotée par variables d'environnement en CI, repli sur
// keystore.properties (gitignoré) pour les builds release locaux. Aucun secret
// committé. Voir keystore.properties.example et .github/workflows/release.yml.
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}

android {
    namespace = 'com.jehutyno.yomikata'

    compileSdkVersion 37

    defaultConfig {
        applicationId "com.jehutyno.yomikata"
        minSdkVersion 23
        targetSdkVersion 37
        // versionCode / versionName dérivés du tag git en CI (VERSION_CODE /
        // VERSION_NAME injectés par le workflow). Repli sur les valeurs prod
        // courantes pour les builds locaux.
        versionCode = (System.getenv("VERSION_CODE") ?: "20001").toInteger()
        versionName = System.getenv("VERSION_NAME") ?: "2.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            def storePath = System.getenv("KEYSTORE_FILE") ?: keystoreProps['storeFile']
            if (storePath) {
                storeFile     = file(storePath)
                storePassword = System.getenv("KEYSTORE_PASSWORD") ?: keystoreProps['storePassword']
                keyAlias      = System.getenv("KEY_ALIAS")         ?: keystoreProps['keyAlias']
                keyPassword   = System.getenv("KEY_PASSWORD")      ?: keystoreProps['keyPassword']
            }
        }
    }

    ksp {
        arg('room.schemaLocation', "$projectDir/schemas")
    }

    buildFeatures {
        viewBinding = true
        compose true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix '.debug'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    testOptions {
        // Required by Robolectric/Roborazzi to access merged Android resources from JVM tests
        unitTests {
            includeAndroidResources = true
            // Roborazzi renders full screens to bitmaps; give the test JVM enough heap
            all {
                it.maxHeapSize = "2048m"
            }
        }
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        androidTest.assets.srcDirs += files("$projectDir/schemas".toString())
        debug {
            res.srcDirs = ['src/main/res-debug/']
        }
    }
}

