plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.kotlin.android)
    alias(libs.plugins.google.services)
    alias(libs.plugins.ksp)
}

android {
    namespace = 'com.jehutyno.yomikata'

    compileSdkVersion 36

    defaultConfig {
        applicationId "com.jehutyno.yomikata"
        minSdkVersion 23
        targetSdkVersion 36
        versionCode 65
        versionName "1.25"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    ksp {
        arg('room.schemaLocation', "$projectDir/schemas")
    }

    buildFeatures {
        viewBinding = true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix '.debug'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        androidTest.assets.srcDirs += files("$projectDir/schemas".toString())
        debug {
            res.srcDirs = ['src/main/res-debug/']
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // AndroidX
    implementation libs.androidx.appcompat
    implementation libs.androidx.material
    implementation libs.androidx.cardview
    implementation libs.androidx.viewpager2
    implementation libs.androidx.preference.ktx
    implementation libs.androidx.lifecycle.livedata

    // Room
    implementation libs.androidx.room.runtime
    implementation libs.androidx.room.ktx
    ksp           libs.androidx.room.compiler

    // Coroutines
    implementation libs.kotlinx.coroutines.android

    // Media3
    implementation libs.bundles.media3

    // Firebase
    implementation platform(libs.firebase.bom)
    implementation libs.bundles.firebase

    // DI
    implementation libs.kodein

    // Splitties
    implementation libs.splitties.alertdialog

    // Logging
    implementation libs.kotlin.logging
    implementation libs.slf4j.android

    // UI libs
    implementation libs.kenburnsview
    implementation 'com.eftimoff:android-pathview:1.0.8@aar'  // @aar obligatoire pour résoudre les attrs SVG
    implementation libs.circleimageview
    implementation libs.hiraganaedittext
    implementation libs.fab
    implementation libs.verticalseekbar
    implementation libs.crescento
    implementation libs.expandabletextview
    implementation libs.calligraphy
    implementation libs.viewpump

    // Tests
    testImplementation     libs.junit
    testImplementation     libs.arch.core.testing
    testImplementation     libs.mockk
    testImplementation     libs.kotlinx.coroutines.test
    androidTestImplementation libs.androidx.test.junit
    androidTestImplementation libs.espresso.core
    androidTestImplementation libs.truth
    androidTestImplementation libs.arch.core.testing
    androidTestImplementation libs.androidx.room.testing
}
